<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>NLP课程助教聊天机器人</title>
    <style>
        body { max-width: 800px; margin: 2rem auto; padding: 0 1rem; font-family: Arial, sans-serif; }
        #chat-box { border: 1px solid #ddd; height: 400px; overflow-y: auto; padding: 1rem; margin-bottom: 1rem; border-radius: 8px; background: #fafafa; }
        .user-msg { text-align: right; margin: 0.5rem 0; color: #007bff; }
        .bot-msg { text-align: left; margin: 0.5rem 0; color: #333; }
        #input-area { display: flex; gap: 0.5rem; }
        #user-input { flex: 1; padding: 0.8rem; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 0.8rem 1.5rem; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>NLP课程助教</h1>
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="输入你的问题，按回车发送">
        <button onclick="sendMessage()">发送</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message) return;

            const chatBox = document.getElementById('chat-box');
            // 显示用户消息
            chatBox.innerHTML += `<div class="user-msg">你：${message}</div>`;
            input.value = '';

            try {
                // 调用后端接口
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                // 显示机器人回复
                chatBox.innerHTML += `<div class="bot-msg">助教：${data.reply}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) {
                chatBox.innerHTML += `<div class="bot-msg">助教：出错了，请稍后再试</div>`;
            }
        }

        // 回车发送消息
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
